<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Train">
  <title>Train</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div id="view" class="view-container"></div>

  <nav class="bottom-nav" id="bottomNav">
    <a class="nav-item active" href="#home" data-hash="#home">
      <svg class="nav-icon" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>Home</span>
    </a>
    <a class="nav-item" href="#workout" data-hash="#workout">
      <svg class="nav-icon" viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><rect x="2" y="10.5" width="3" height="3" rx="1"/><rect x="19" y="10.5" width="3" height="3" rx="1"/><rect x="6.5" y="9" width="2.5" height="6" rx="1"/><rect x="15" y="9" width="2.5" height="6" rx="1"/></svg>
      <span>Lift</span>
    </a>
    <a class="nav-item" href="#rower" data-hash="#rower">
      <svg class="nav-icon" viewBox="0 0 24 24"><path d="M2 13c1.5-2 3.5-3 6-3s4.5 1 6 3 3.5 3 6 3"/><path d="M2 8c1.5-2 3.5-3 6-3s4.5 1 6 3 3.5 3 6 3"/></svg>
      <span>Row</span>
    </a>
    <a class="nav-item" href="#kettlebell" data-hash="#kettlebell">
      <svg class="nav-icon" viewBox="0 0 24 24"><circle cx="12" cy="15" r="5"/><path d="M9.5 10a3 3 0 015 0"/><path d="M8 8.5C8 7 9.5 6 12 6s4 1 4 2.5"/></svg>
      <span>KB</span>
    </a>
    <a class="nav-item" href="#history" data-hash="#history">
      <svg class="nav-icon" viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      <span>Progress</span>
    </a>
  </nav>

  <!-- Timer overlay -->
  <div id="timerOverlay" class="timer-overlay hidden">
    <div class="timer-card">
      <div class="timer-label" id="timerLabel">Rest</div>
      <div class="timer-ring-wrap">
        <svg class="timer-ring" viewBox="0 0 110 110">
          <circle class="timer-ring-bg" cx="55" cy="55" r="48"/>
          <circle class="timer-ring-fg" id="timerRingFg" cx="55" cy="55" r="48"/>
        </svg>
        <div class="timer-time" id="timerTime">3:00</div>
      </div>
      <div class="timer-actions">
        <button class="btn btn-ghost timer-action-btn" id="timerMinus">-30s</button>
        <button class="btn btn-ghost timer-action-btn" id="timerPause">Pause</button>
        <button class="btn btn-ghost timer-action-btn" id="timerPlus">+30s</button>
      </div>
      <button class="btn btn-outline" id="timerSkip">Skip rest</button>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
